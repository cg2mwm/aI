<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexus AI</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0a0a0f;--surface:#12121a;--surface2:#1a1a26;--border:#2a2a3a;--text:#e8e8f0;--text-dim:#8888a0;--accent:#6ee7b7;--accent-dim:rgba(110,231,183,.1);--user-bg:#1e1e30;--ai-bg:#14141f;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);height:100dvh;display:flex;overflow:hidden;}

  .sidebar{width:250px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;transition:transform .25s;}
  .sh{padding:16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;}
  .logo{width:30px;height:30px;background:linear-gradient(135deg,var(--accent),#34d399);border-radius:8px;display:grid;place-items:center;font-family:'Space Mono',monospace;font-weight:700;font-size:14px;color:var(--bg);}
  .sh h1{font-size:15px;font-weight:700;}
  .nb{margin:10px 10px 6px;padding:10px 12px;background:var(--accent-dim);border:1px solid rgba(110,231,183,.2);border-radius:10px;color:var(--accent);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;text-align:left;}
  .nb:hover{background:rgba(110,231,183,.18);}
  .cl{flex:1;overflow-y:auto;padding:4px 8px;}
  .cl::-webkit-scrollbar{width:4px;}.cl::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
  .ci{padding:9px 10px;border-radius:8px;cursor:pointer;font-size:13px;color:var(--text-dim);display:flex;align-items:center;justify-content:space-between;gap:6px;margin-bottom:1px;}
  .ci:hover{background:var(--surface2);}.ci.on{background:var(--surface2);color:var(--text);}
  .ci span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;}
  .ci button{opacity:0;background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:15px;padding:0 3px;}
  .ci:hover button{opacity:1;}.ci button:hover{color:#f87171;}

  .main{flex:1;display:flex;flex-direction:column;min-width:0;}
  header{padding:12px 20px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0;}
  .mb{display:none;background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:22px;padding:4px;}
  header .t{font-size:14px;font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  header .badge{font-size:10px;font-family:'Space Mono',monospace;color:var(--accent);background:var(--accent-dim);padding:3px 8px;border-radius:6px;}

  #chat{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:8px;scroll-behavior:smooth;}
  #chat::-webkit-scrollbar{width:5px;}#chat::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}

  .msg{max-width:700px;padding:12px 16px;border-radius:14px;line-height:1.6;font-size:14.5px;animation:fi .2s ease;white-space:pre-wrap;word-wrap:break-word;}
  .msg.u{background:var(--user-bg);align-self:flex-end;border-bottom-right-radius:4px;border:1px solid var(--border);}
  .msg.a{background:var(--ai-bg);align-self:flex-start;border-bottom-left-radius:4px;border:1px solid var(--border);}
  .msg .l{font-size:10px;font-family:'Space Mono',monospace;text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;display:block;}
  .msg.a .l{color:var(--accent);}.msg.u .l{color:var(--text-dim);}

  .dots{display:inline-flex;gap:5px;padding:6px 0;}
  .dots span{width:6px;height:6px;background:var(--accent);border-radius:50%;animation:bo 1.2s infinite;opacity:.5;}
  .dots span:nth-child(2){animation-delay:.15s;}.dots span:nth-child(3){animation-delay:.3s;}
  @keyframes bo{0%,60%,100%{transform:translateY(0);opacity:.5;}30%{transform:translateY(-5px);opacity:1;}}
  @keyframes fi{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}

  .welcome{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:10px;color:var(--text-dim);}
  .welcome h2{font-size:26px;color:var(--text);letter-spacing:-.03em;}
  .welcome p{font-size:14px;max-width:380px;}

  .bar{padding:14px 20px 18px;border-top:1px solid var(--border);background:var(--surface);flex-shrink:0;}
  .wrap{display:flex;gap:10px;max-width:780px;margin:0 auto;}
  #inp{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:12px 16px;font-family:'DM Sans',sans-serif;font-size:14.5px;color:var(--text);resize:none;outline:none;min-height:46px;max-height:150px;}
  #inp:focus{border-color:var(--accent);}#inp::placeholder{color:var(--text-dim);}
  #go{width:46px;height:46px;background:var(--accent);border:none;border-radius:12px;cursor:pointer;display:grid;place-items:center;flex-shrink:0;align-self:flex-end;transition:transform .12s,opacity .12s;}
  #go:hover{transform:scale(1.05);}#go:disabled{opacity:.4;cursor:not-allowed;transform:none;}
  #go svg{width:18px;height:18px;fill:var(--bg);}
  .err{color:#f87171;font-size:12px;padding:6px 12px;background:rgba(248,113,113,.08);border-radius:8px;border:1px solid rgba(248,113,113,.2);}

  @media(max-width:700px){
    .sidebar{position:fixed;inset:0;z-index:100;width:270px;transform:translateX(-100%);}
    .sidebar.open{transform:translateX(0);}
    .mb{display:block;}
    .ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:99;}
    .ov.show{display:block;}
  }
</style>
</head>
<body>
<div class="ov" id="ov" onclick="tog()"></div>
<aside class="sidebar" id="sb">
  <div class="sh"><div class="logo">N</div><h1>Nexus AI</h1></div>
  <button class="nb" onclick="nc()">+ New Chat</button>
  <div class="cl" id="cl"></div>
</aside>
<div class="main">
  <header>
    <button class="mb" onclick="tog()">☰</button>
    <div class="t" id="ht">Nexus AI</div>
    <span class="badge">llama 3.3 70b</span>
  </header>
  <div id="chat"><div class="welcome"><h2>What's on your mind?</h2><p>Ask anything — code, writing, analysis, brainstorming, or just chat. Free and unlimited.</p></div></div>
  <div class="bar"><div class="wrap">
    <textarea id="inp" placeholder="Send a message..." rows="1"></textarea>
    <button id="go"><svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg></button>
  </div></div>
</div>
<script>
const ce=document.getElementById('chat'),ip=document.getElementById('inp'),gb=document.getElementById('go'),cl=document.getElementById('cl'),ht=document.getElementById('ht');
let ch={},aid=null,busy=false;

function load(){try{ch=JSON.parse(localStorage.getItem('nx')||'{}');}catch{}rl();}
function save(){localStorage.setItem('nx',JSON.stringify(ch));}

function nc(){const id='c'+Date.now();ch[id]={t:'New Chat',m:[]};aid=id;save();rl();ra();tog(false);ip.focus();}
function sw(id){aid=id;rl();ra();tog(false);}
function del(id,e){e.stopPropagation();delete ch[id];if(aid===id){const k=Object.keys(ch);aid=k.length?k[k.length-1]:null;}save();rl();ra();}

function rl(){
  cl.innerHTML='';
  Object.keys(ch).reverse().forEach(id=>{
    const d=document.createElement('div');d.className='ci'+(id===aid?' on':'');
    d.innerHTML=`<span>${esc(ch[id].t)}</span><button>×</button>`;
    d.addEventListener('click',()=>sw(id));
    d.querySelector('button').addEventListener('click',e=>del(id,e));
    cl.appendChild(d);
  });
}

function ra(){
  ce.innerHTML='';
  if(!aid||!ch[aid]){ce.innerHTML='<div class="welcome"><h2>What\'s on your mind?</h2><p>Ask anything — code, writing, analysis, brainstorming, or just chat. Free and unlimited.</p></div>';ht.textContent='Nexus AI';return;}
  ht.textContent=ch[aid].t;
  ch[aid].m.forEach(m=>am(m.role==='user'?'u':'a',m.content));
}

function tog(f){
  const s=document.getElementById('sb'),o=document.getElementById('ov');
  const op=f!==undefined?f:!s.classList.contains('open');
  s.classList.toggle('open',op);o.classList.toggle('show',op);
}

ip.addEventListener('input',()=>{ip.style.height='auto';ip.style.height=Math.min(ip.scrollHeight,150)+'px';});
ip.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();go();}});
gb.addEventListener('click',go);

async function go(){
  const t=ip.value.trim();if(!t||busy)return;
  if(!aid)nc();
  busy=true;gb.disabled=true;
  const c=ch[aid];c.m.push({role:'user',content:t});
  if(c.m.length===1){c.t=t.length>40?t.slice(0,40)+'…':t;ht.textContent=c.t;rl();}
  const w=ce.querySelector('.welcome');if(w)w.remove();
  am('u',t);ip.value='';ip.style.height='auto';
  const el=am('a','');el.querySelector('.c').innerHTML='<div class="dots"><span></span><span></span><span></span></div>';

  try{
    const r=await fetch('/api/chat',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        messages:c.m.filter(x=>x.role==='user'||x.role==='assistant')
      })
    });
    const d=await r.json();
    if(d.error)throw new Error(d.error);
    const reply=(d.response||'').trim();
    if(!reply)throw new Error('Empty response');
    el.querySelector('.c').textContent=reply;
    c.m.push({role:'assistant',content:reply});
  }catch(e){
    el.querySelector('.c').innerHTML=`<span class="err">${esc(e.message)}</span>`;
    c.m.pop();
  }
  save();busy=false;gb.disabled=false;ce.scrollTop=ce.scrollHeight;ip.focus();
}

function am(r,t){
  const d=document.createElement('div');d.className=`msg ${r}`;
  d.innerHTML=`<span class="l">${r==='a'?'Nexus':'You'}</span><span class="c">${esc(t)}</span>`;
  ce.appendChild(d);ce.scrollTop=ce.scrollHeight;return d;
}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}

load();const k=Object.keys(ch);if(k.length){aid=k[k.length-1];rl();ra();}
</script>
</body>
</html>
